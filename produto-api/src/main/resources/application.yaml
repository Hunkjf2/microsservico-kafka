server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: produto-api
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/db_cliente?currentSchema=cliente
    username: postgres
    password: postgresql
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
    flyway:
      baseline-on-migrate: true
      baseline-version: 0
      schemas: cliente
    kafka:
      bootstrap-servers: localhost:9092
      producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
